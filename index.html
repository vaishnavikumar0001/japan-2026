<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1F4E79">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Japan 2026">
  <meta name="description" content="Japan Trip 2026 — Personal Travel Companion">
  <title>Japan 2026</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- HEADER -->
  <header id="app-header">
    <div class="header-inner">
      <span id="header-title">🇯🇵 Japan 2026</span>
      <button id="search-btn" class="icon-btn" aria-label="Search">🔍</button>
    </div>
  </header>

  <!-- SEARCH OVERLAY -->
  <div id="search-overlay" class="hidden">
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search activities, places, hotels…" autocomplete="off">
      <button id="search-close" class="icon-btn">✕</button>
    </div>
    <div id="search-results"></div>
  </div>

  <!-- MAIN CONTENT -->
  <main id="main-content">

    <!-- TAB: ITINERARY -->
    <section id="tab-itinerary" class="tab-panel active">
      <div id="itinerary-content"></div>
    </section>

    <!-- TAB: HOTELS -->
    <section id="tab-hotels" class="tab-panel">
      <div id="hotels-content"></div>
    </section>

    <!-- TAB: TRAINS -->
    <section id="tab-trains" class="tab-panel">
      <div id="trains-content"></div>
    </section>

    <!-- TAB: ONSENS -->
    <section id="tab-onsens" class="tab-panel">
      <div id="onsens-content"></div>
    </section>

    <!-- TAB: CHECKLISTS -->
    <section id="tab-checklists" class="tab-panel">
      <div id="checklists-content"></div>
    </section>

  </main>

  <!-- BOTTOM NAV -->
  <nav id="bottom-nav">
    <button class="nav-btn active" data-tab="itinerary">
      <span class="nav-icon">📅</span>
      <span class="nav-label">Today</span>
    </button>
    <button class="nav-btn" data-tab="hotels">
      <span class="nav-icon">🏨</span>
      <span class="nav-label">Hotels</span>
    </button>
    <button class="nav-btn" data-tab="trains">
      <span class="nav-icon">🚄</span>
      <span class="nav-label">Trains</span>
    </button>
    <button class="nav-btn" data-tab="onsens">
      <span class="nav-icon">♨️</span>
      <span class="nav-label">Onsens</span>
    </button>
    <button class="nav-btn" data-tab="checklists">
      <span class="nav-icon">✅</span>
      <span class="nav-label">Lists</span>
    </button>
  </nav>

  <!-- SCRIPTS -->
  <script src="js/data.js"></script>
  <script src="js/itinerary.js"></script>
  <script src="js/hotels.js"></script>
  <script src="js/trains.js"></script>
  <script src="js/onsens.js"></script>
  <script src="js/checklists.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
